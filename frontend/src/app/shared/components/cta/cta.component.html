<section class="cta">
  <div class="cta-inner">

    <div class="cta-badge">Ready to start?</div>
    <h2 class="cta-title">Start watching your markets today</h2>
    <p class="cta-subtitle">Create your account in 30 seconds. No credit card required.</p>

    <div class="cta-actions">
      @if (!isLoggedIn()) {
        <a routerLink="/register" class="btn-primary">
          Get started free
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a routerLink="/login" class="btn-ghost">Already have an account?</a>
      } @else {
        <a routerLink="/home" class="btn-primary">
          Open dashboard
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      }
    </div>

    <div class="cta-stack">
      <span>.NET 8</span>
      <span>·</span>
      <span>Angular 18</span>
      <span>·</span>
      <span>SignalR</span>
      <span>·</span>
      <span>PostgreSQL</span>
    </div>

  </div>
</section>
