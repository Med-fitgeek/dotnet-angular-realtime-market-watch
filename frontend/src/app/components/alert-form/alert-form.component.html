<div class="alert-form">
  <h3>Définir une alerte</h3>

  <div class="form-row">
    <label>Actif</label>
    <select [(ngModel)]="selectedSymbol">
      <option *ngFor="let s of symbols" [value]="s">{{ s }}</option>
    </select>
  </div>

  <div class="form-row">
    <label>Condition</label>
    <select [(ngModel)]="direction">
      <option value="above">Au-dessus de</option>
      <option value="below">Au-dessous de</option>
    </select>
  </div>

  <div class="form-row">
    <label>Seuil</label>
    <input type="number" step="0.0001" [(ngModel)]="threshold" placeholder="ex: 196.50" />
  </div>

  <button (click)="submit()">Créer l'alerte</button>

  <p *ngIf="confirmation" class="confirmation">{{ confirmation }}</p>
</div>
