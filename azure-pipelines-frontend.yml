# azure-pipelines.yml
# CI/CD - Frontend Angular (market-watch-client)
# Cible : Azure Static Web App "stapp-market-watch"

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/*

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  workingDirectory: 'frontend'
  # Angular 17 (builder "application") place le build dans un sous-dossier /browser
  outputLocation: 'dist/market-watch-client/browser'

stages:
  # ---------------------------------------------------------------
  # STAGE UNIQUE : Build, Test & Deploy (même job -> même workspace monté)
  # ---------------------------------------------------------------
  - stage: BuildAndDeploy
    displayName: 'Build & Deploy to Azure Static Web Apps'
    jobs:
      - job: BuildAndDeployJob
        displayName: 'Install - Test - Build - Deploy'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Installer Node.js'

          - script: npm ci
            workingDirectory: $(workingDirectory)
            displayName: 'npm ci'

          - script: npm run build -- --configuration production
            workingDirectory: $(workingDirectory)
            displayName: 'ng build --configuration production'

          # IMPORTANT : app_location doit rester un chemin RELATIF au repo checkouté
          # (System.DefaultWorkingDirectory), car la tâche tourne dans un conteneur
          # qui ne monte que ce dossier en /working_dir. Un chemin venant d'un autre
          # job (ex: Pipeline.Workspace/drop) n'est pas monté -> "invalid directory".
          - task: AzureStaticWebApp@0
            inputs:
              app_location: '$(workingDirectory)/$(outputLocation)'
              output_location: '.'
              skip_app_build: true
              skip_api_build: true
              azure_static_web_apps_api_token: '$(AZURE_STATIC_WEB_APPS_API_TOKEN)'
            displayName: 'Déployer sur stapp-market-watch'